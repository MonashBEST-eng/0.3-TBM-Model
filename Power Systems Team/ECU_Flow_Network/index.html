<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ECU Power Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- File upload for CSV input -->
  <input type="file" id="csvInput" accept=".csv">

  <!-- Container holding the left supply info and right components -->
  <div id="container">
    <div id="supplyBox">
      <h3>Supply</h3>
      <p>Voltage: <span id="supplyVoltage">48V</span></p>
      <p>Total Power Draw: <span id="totalPower">0W</span></p>
      <p>Max Total Power Draw: <span id="maxTotalPower">0W</span></p>
    </div>
    <div id="componentsBox">
      <h3>ECUs</h3>
    </div>
  </div>

  <!-- Canvas for drawing lines -->
  <canvas id="connectionCanvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
