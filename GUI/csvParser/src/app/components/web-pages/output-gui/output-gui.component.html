<div class="duration-300 text-2xl lg:text-4xl text-center font-normal p-4 rounded-3xl w-[70vw] md:w-[50vw] h-[50vh] bg-white flex flex-col items-center justify-evenly">  
    <div class="flex w-full justify-between">
        <app-back-button></app-back-button>
        <div class="flex">
            @if(resultObject.length > 1){
            <fa-icon [icon]="faSquareCaretLeft" class="mr-3 cursor-pointer text-[2rem] hover:text-blue-500" (click)="prevGraph()"></fa-icon>
            <fa-icon [icon]="faSquareCaretRight" class="cursor-pointer text-[2rem] hover:text-blue-500" (click)="nextGraph()"></fa-icon>
            }
        </div>
    </div>
    <div class="flex items-center justify-evenly w-full h-full">
        <div id="chart" class="w-[80%] h-[100%]">
            <apx-chart
            [series]="chartOptions[index].series"
            [chart]="chartOptions[index].chart"
            [labels]="chartOptions[index].labels"
            [dataLabels]="chartOptions[index].dataLabels"
            [grid]="chartOptions[index].grid"
            [stroke]="chartOptions[index].stroke"
            [title]="chartOptions[index].title"
            width = "100%"
            height = "100%"
            ></apx-chart>
        </div>
        <div class="flex flex-col items-end justify-start">
            <div class="mb-20 flex flex-col items-end">
                <h1>Variance:</h1>
                <h1>{{resultObject[index].variance | number : '1.2-2'}}</h1>
            </div>
            <div class="mb-20 flex flex-col items-end">
                <h1>R2 value:</h1>
                <h1>{{resultObject[index].variance | number : '1.2-2'}}</h1>
            </div>
        </div>
    </div> 
</div>
